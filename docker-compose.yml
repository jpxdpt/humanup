services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: humanup:latest
    container_name: humanup
    restart: unless-stopped
    ports:
      - "${PORT:-8765}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - POSTGRES_URL=postgres://humanup:humanup_pass@db:5432/humanup
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_NAME=${ADMIN_NAME}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: humanup-db
    restart: unless-stopped
    #ports:
    #  - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: humanup
      POSTGRES_PASSWORD: humanup_pass
      POSTGRES_DB: humanup
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humanup"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
